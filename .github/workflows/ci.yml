name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  rust-engine:
    name: Rust physics engine
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Rustfmt
        run: cargo fmt --check -p sonic-ct

      - name: Clippy (deny warnings)
        run: cargo clippy --release -p sonic-ct --lib -- -D warnings

      - name: Tests (physics gates)
        run: cargo test --release -p sonic-ct

  governance-gates:
    name: MetaBioHacker governance gates
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install
        run: cd packages/metabiohacker && npm ci || npm install

      - name: Governance tests
        run: cd packages/metabiohacker && npm test
