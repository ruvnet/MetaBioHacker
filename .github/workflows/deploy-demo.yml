name: Deploy Demo to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "examples/sonic-ct/**"
      - "crates/sonic-ct-wasm/**"
      - "scripts/build-sonic-ct-wasm.sh"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: demo-pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM
        run: bash scripts/build-sonic-ct-wasm.sh

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: examples/sonic-ct/package-lock.json

      - name: Install demo dependencies
        run: cd examples/sonic-ct && npm ci || npm install

      - name: Build demo
        run: cd examples/sonic-ct && npm run build
        env:
          GITHUB_PAGES: "true"

      - name: Stage demo under /demo/
        run: |
          mkdir -p _site/demo
          cp -r examples/sonic-ct/dist/. _site/demo/
          # Root redirect to /demo/
          cat > _site/index.html << 'HTML'
          <!DOCTYPE html>
          <html>
            <head>
              <meta http-equiv="refresh" content="0; url=demo/" />
              <title>MetaBioHacker Demo</title>
            </head>
            <body><a href="demo/">Open demo</a></body>
          </html>
          HTML

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
